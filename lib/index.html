<!DOCTYPE html>
<html>
    <head lang="zh">
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="renderer" content="webkit" />
        <meta name="viewport" content="width=device-width, initial-scale=1,user-scalable=0" />
        <title>Luckysheet</title>
        <link rel="stylesheet" href="./plugins/css/pluginsCss.css" />
        <link rel="stylesheet" href="./plugins/plugins.css" />
        <link rel="stylesheet" href="./css/luckysheet.css" />
        <link rel="stylesheet" href="./assets/iconfont/iconfont.css" />
        <script src="./plugins/js/plugin.js"></script>

        <!-- rollup luckysheet.js -->
        <script src="./luckysheet.umd.js"></script>
        <script src="./demoData/sheetVchart.js"></script>
        <script src="./demoData/sheetChart.js"></script>
        <script src="./demoData/sheetCell.js"></script>
        <script src="./demoData/sheetPicture.js"></script>
        <script src="./demoData/sheetRemoteSelect.js"></script>
    </head>

    <body>
        <div id="luckysheet" style="margin: 0px; padding: 0px; position: absolute; width: 100%; height: 100%; left: 0px; top: 0px"></div>

        <!-- Utils 工具类 -->
        <script>
            // 动态配置选项
            function dynamicOptions(server, useRandomUserId, gridkey, isCollabration, requestHeaders, commonOptions) {
                let options = commonOptions;

                // 1. 处理合并
                options = Object.assign(options, { requestHeaders });

                // 2. 如果不需要协同，则直接返回该对象即可
                if (!isCollabration) return options;

                // 3. 处理用户
                const { userid, username, department, role } = getUserInfo(useRandomUserId);

                // 解析 server
                const { wsServer, serviceServer } = server;

                // 处理协同
                options.allowUpdate = true; // 配置协同功能
                options.loadUrl = getLoadUrl(serviceServer, gridkey);
                options.updateUrl = getUpdateUrl(wsServer, userid, username, gridkey); // 协同服务转发服务
                // 如果配置了协同，请配置图片处理函数，避免base64图片过大导致图片无法显示
                options.uploadImage = uploadImage(file, serviceServer);
                options.imageUrlHandle = (url) => imageUrlHandle(url, serviceServer);

                // 处理 cellProtectOptions

                return options;
            }

            // 处理协同图片上传
            async function uploadImage(file, serviceServer) {
                // 此处拿到的是上传的 file 对象，进行文件上传 ，配合 node 接口实现
                const formData = new FormData();
                formData.append("image", file);

                // 结合 Ajax 实现图片上传
                return new Promise((resolve, reject) => {
                    $.ajax({
                        url: `${serviceServer}/uploadImage`,
                        type: "POST",
                        data: formData,
                        processData: false,
                        contentType: false,
                        success: function (res) {
                            if (res.code === 200) resolve(res.url);
                            else reject("image upload error");
                        },
                        error: function (err) {
                            reject("image upload error");
                        },
                    });
                });
            }

            // 处理上传图片的地址
            function imageUrlHandle(url, serviceServer) {
                // 已经是 // http data 开头则不处理
                if (/^(?:\/\/|(?:http|https|data):)/i.test(url)) return url;
                // 不然拼接服务器路径
                return serviceServer + url;
            }

            // 动态获取 luadUrl
            function getLoadUrl(serviceServer, gridkey) {
                return `${serviceServer}/luckysheet/loadSheetData?gridkey=${gridkey}`;
            }

            // 动态获取 updateUrl
            function getUpdateUrl(collabrationServer, userid, username, gridkey) {
                return `${collabrationServer}/luckysheet?type=luckysheet&userid=${userid}&username=${username}&gridkey=${gridkey}`;
            }

            // 处理用户系统
            function getUserInfo(useRandomUserId = true) {
                const randomId = Math.random().toString(16).slice(2, 8);
                const userid = `MVP_User_${randomId}`;
                const username = userid;

                // 如果使用随机ID 则直接返回随机值
                if (useRandomUserId) {
                    return { userid, username };
                }

                // 1. 如果系统存储有用户信息，则直接使用
                let userInfo = sessionStorage.getItem("userInfo");
                if (userInfo) return JSON.parse(userInfo);

                // 3. 分配一个部门及角色
                const departments = [
                    { depName: "产品部", depId: "dep_001" },
                    { depName: "开发部", depId: "dep_002" },
                    { depName: "测试部", depId: "dep_003" },
                    { depName: "运营部", depId: "dep_004" },
                ];
                const department = departments[Math.floor(Math.random() * departments.length)];

                // 4. 随机生成一个角色
                const roles = [
                    { roleName: "部门经理", roleId: "role_001" },
                    { roleName: "组长", roleId: "role_002" },
                    { roleName: "组员", roleId: "role_003" },
                ];
                const role = roles[Math.floor(Math.random() * roles.length)];

                // 5. 生成用户信息
                userInfo = { userid, username, department, role };
                // 6. 存储用户信息
                sessionStorage.setItem("userInfo", JSON.stringify(userInfo));

                return userInfo;
            }
        </script>
        <!-- 初始化执行方法 -->
        <script>
            // 公共配置项
            const commonOptions = {
                container: "luckysheet",
                lang: "zh",
                // plugins: [{ name: "vchart" }, { name: "chart" }],
                data: [sheetCell],
                // 打印像素比，设置越高，越清晰
                printDevicePixelRatio: 4,
                customShortcuts: [
                    {
                        ctrl: true,
                        key: "p",
                        callback: () => {
                            console.log("打印");
                        },
                    },
                ],
                // row: 10,
                // column: 10,
                // showmenu:false,
                // showlogo:false,
                // loading 样式
                loading: {
                    image: () => `<svg viewBox="25 25 50 50" class="circular"><circle cx="50" cy="50" r="20" fill="none"></circle></svg>`,
                    imageClass: "loadingAnimation",
                },
                cellProtectOptions: {
                    // 配置当前用户信息(请注意：这个是当前初始化文档的用户信息)
                    userInfo: {
                        depId: "111000008",
                        depName: "风险管理部",
                        roleId: "1579417391486", //系统管理员
                        roleName: "系统管理员",
                        userId: "1521e7e8e970467ca99687c9e1095271",
                    },

                    getDepartmentOptions: async () => {
                        return Promise.resolve([
                            { label: "风险管理部", value: "111000008" },
                            { label: "开发部", value: "111000006" },
                        ]);
                    },

                    getUserOptions: async (departmentID) => {
                        // 模拟不同部门返回不同用户
                        const usersMap = {
                            111000008: [
                                { label: "张三", value: "user001" },
                                { label: "李四", value: "user002" },
                            ],
                            111000006: [{ label: "王五", value: "user003" }],
                        };
                        return usersMap[departmentID] || [];
                    },
                },
            };

            /**
             * @description 页面初始化相关工作
             */
            $(function () {
                /**
                 * -------------------------------------------------------
                 * ⚠️ 注意：请严格按照下列步骤进行配置，否则会导致无法协同 ⚠️
                 * -------------------------------------------------------
                 */

                // 1. 请明确协同服务地址
                const wsServer = "ws://localhost:9000";

                // 2. 请明确业务服务地址
                const serviceServer = "http://localhost:9000";

                // 3. 是否使用随机ID，如果是，则每次刷新页面都会生成一个新的 userid
                // 如果为 false，则 userid 固定，使用 sessionStorage 存储
                const useRandomUserId = true;

                // 4. 这个是协同的文件 gridKey 请真实的设置为数据库的 key，不然会提示协同服务异常 是真实数据库表的 workerbooks gridKey 字段
                const gridkey = "gridkey_demo";

                // 5. 明确是否需要协同功能
                const isCollabration = false;

                // 6. 是否需要携带其他 request headers
                const requestHeaders = {
                    // "Custom-userid": userid,
                };

                // 7. 根据上诉条件，动态获取配置项
                const server = { wsServer, serviceServer };

                // 这个函数在 ./utils.js 中定义
                const options = dynamicOptions(server, useRandomUserId, gridkey, isCollabration, requestHeaders, commonOptions);

                // 10. 创建表格
                luckysheet.create(options);
            });
        </script>
    </body>
</html>
